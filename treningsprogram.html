<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Treningsprogram</title>
<style>
  :root{
    --bg:#0a0c10; --card:#14181f; --card2:#1b212b; --line:#262d39;
    --txt:#e9edf3; --mut:#8a929f; --acc:#ff5a36; --ss:#5b6472; --su:#3b82f6;
    --ok:#10b981; --gold:#e0b341;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:16px;line-height:1.4;-webkit-text-size-adjust:100%}
  .wrap{max-width:580px;margin:0 auto;padding:14px 14px 120px}
  h1{font-size:20px;margin:4px 0 2px;letter-spacing:-.3px}
  .sub{color:var(--mut);font-size:13px;margin-bottom:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .row{display:flex;gap:8px;align-items:center}
  .btn{appearance:none;border:none;border-radius:12px;font-size:16px;font-weight:600;
    padding:14px;color:var(--txt);background:var(--card2);cursor:pointer;width:100%;text-align:left}
  .btn:active{transform:scale(.99)}
  .day{display:flex;justify-content:space-between;align-items:center;background:var(--card2);
    border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer}
  .day b{font-size:17px}
  .day small{color:var(--mut);font-size:12px}
  .tag{font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px;letter-spacing:.3px;white-space:nowrap}
  .t-ss{background:#2a313d;color:#aab2c0}
  .t-dc{background:rgba(255,90,54,.16);color:var(--acc)}
  .t-su{background:rgba(59,130,246,.16);color:#6ea8ff}
  .ex{border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;background:var(--card)}
  .ex.done{border-color:rgba(16,185,129,.4)}
  .exhead{display:flex;gap:10px;align-items:flex-start}
  .ord{min-width:30px;height:30px;border-radius:8px;background:var(--card2);display:flex;
    align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--mut);flex:0 0 auto}
  .exname{font-weight:600;font-size:15.5px;line-height:1.25}
  .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;align-items:center}
  .reps{font-size:12px;color:var(--mut)}
  .note{font-size:12px;color:var(--mut);margin-top:7px;line-height:1.35;border-left:2px solid var(--line);padding-left:8px}
  .sets{margin-top:11px}
  .set{display:flex;gap:7px;align-items:center;margin-bottom:7px}
  .snum{min-width:18px;color:var(--mut);font-size:13px;font-weight:600}
  .fld{flex:1;position:relative}
  .fld input{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);font-size:17px;font-weight:600;padding:11px 10px 11px 12px;text-align:center}
  .fld input:focus{outline:none;border-color:var(--acc)}
  .fld .lab{position:absolute;right:9px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--mut);pointer-events:none}
  .prev{font-size:11px;color:var(--mut);text-align:center;min-width:54px;flex:0 0 auto}
  .chk{width:42px;height:42px;border-radius:10px;border:1px solid var(--line);background:var(--card2);
    display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 auto;cursor:pointer}
  .chk.on{background:var(--ok);border-color:var(--ok);color:#04130d}
  .addset{background:none;border:1px dashed var(--line);color:var(--mut);width:100%;border-radius:10px;
    padding:8px;font-size:13px;cursor:pointer;margin-top:2px}
  .bar{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(transparent,var(--bg) 26%);
    padding:14px;display:flex;gap:10px;max-width:580px;margin:0 auto}
  .bar .btn{text-align:center}
  .primary{background:var(--acc);color:#1a0600}
  .ghost{background:var(--card2)}
  .back{background:none;border:none;color:var(--acc);font-size:15px;padding:6px 0;cursor:pointer;font-weight:600}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:9px 12px;font-size:13px;cursor:pointer;display:flex;gap:7px;align-items:center}
  .chip.on{border-color:var(--ok);color:var(--ok)}
  .kvi{display:flex;justify-content:space-between;font-size:13px;color:var(--mut);padding:3px 0}
  .kvi b{color:var(--txt);font-weight:600}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:50}
  .modal.on{display:flex}
  .sheet{background:var(--card);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:580px;margin:0 auto;max-height:82vh;overflow:auto}
  .sheet h3{margin:0 0 4px}
  .it{margin:12px 0;font-size:14px}
  .it b{color:var(--acc)}
  .timer{position:fixed;right:14px;bottom:92px;background:var(--card2);border:1px solid var(--line);
    border-radius:14px;padding:10px 12px;display:flex;gap:8px;align-items:center;z-index:30;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .timer .t{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;min-width:46px;text-align:center}
  .timer button{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:9px;width:34px;height:34px;font-size:15px;cursor:pointer}
  .small{font-size:12px;color:var(--mut)}
  .hist{font-size:13px;color:var(--mut);padding:8px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .hist:last-child{border:none}
  .toast{position:fixed;left:50%;bottom:130px;transform:translateX(-50%);background:var(--ok);color:#04130d;
    padding:11px 18px;border-radius:12px;font-weight:600;z-index:60;opacity:0;transition:.2s;pointer-events:none}
  .toast.on{opacity:1}
  .seg{display:flex;background:var(--card2);border-radius:10px;padding:3px;gap:3px}
  .seg button{flex:1;background:none;border:none;color:var(--mut);padding:7px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
  .seg button.on{background:var(--acc);color:#1a0600}
</style>

<div class="wrap" id="app"></div>
<div class="modal" id="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
const PROGRAMS = {
  torsoA:{name:"Torso A",ex:[
    {id:"a1",ord:"A",name:"Maskin eller kabel laterals",type:"ss + DC",sets:2,reps:"10–15",note:"1 rett sett + 1 DC (rest-pause ×3)"},
    {id:"a2",ord:"B",name:"Kabel flyes",type:"DC",sets:1,reps:"10–15",note:"Rest-pause ×3 · Fase 2: Life cable"},
    {id:"a3",ord:"C",name:"Incline press",type:"ss",sets:2,reps:"8–12",note:"Fase 2: Granite"},
    {id:"a4",ord:"D",name:"Flat press",type:"DC",sets:1,reps:"8–12",note:"Rest-pause ×3 · Fase 2: Technogym"},
    {id:"a5",ord:"E",name:"Lat pullover i maskin",type:"ss",sets:2,reps:"10–15",note:"Lats"},
    {id:"a6",ord:"F",name:"Chest supported row",type:"ss",sets:2,reps:"8–12",note:"Øvre rygg · Fase 2: Life fitness"},
    {id:"a7",ord:"G",name:"Single arm pulldown",type:"ss",sets:2,reps:"8–12",note:"Lats"},
    {id:"a8",ord:"H",name:"Bent over row",type:"DC",sets:1,reps:"8–12",note:"Rest-pause ×3 · Øvre rygg + ryggstrekkere"},
  ]},
  limbsA:{name:"Limbs A",ex:[
    {id:"b0",ord:"ABS",name:"Planke",type:"ss",sets:2,reps:"60 sek",fields:["sek"],note:"Trekk inn magen ALT du kan. Mål: dypere inntrekk + kontroll, ikke lengre tid."},
    {id:"b1",ord:"A1",name:"MTS curl",type:"supersett",sets:3,reps:"10–15",note:"Supersett m/ A2"},
    {id:"b2",ord:"A2",name:"Nitro tricep",type:"supersett",sets:3,reps:"10–15",note:"Supersett m/ A1"},
    {id:"b3",ord:"B",name:"Stående ham curl",type:"ss",sets:2,reps:"8–12"},
    {id:"b4",ord:"C",name:"Adductor",type:"ss",sets:2,reps:"10–15"},
    {id:"b5",ord:"D",name:"Leg extension",type:"DC",sets:1,reps:"10–15",note:"Rest-pause ×3"},
    {id:"b6",ord:"E",name:"Single leg hip press",type:"ss",sets:2,reps:"10–15"},
    {id:"b7",ord:"—",name:"Hyperextension",type:"ss",sets:2,reps:"10–15"},
    {id:"b8",ord:"F",name:"Calf raise",type:"ss",sets:2,reps:"10–15",note:"2 sek stopp på strekk"},
  ]},
  torsoB:{name:"Torso B",ex:[
    {id:"c0",ord:"ABS",name:"Ab mat crunch",type:"ss",sets:3,reps:"8–12",note:"Blås ut all luft inn i bunn — min. 3 sek på kort muskellengde"},
    {id:"c1",ord:"A",name:"Reverse flyes",type:"ss",sets:2,reps:"10–15"},
    {id:"c2",ord:"B",name:"Maskin eller kabel laterals",type:"ss + DC",sets:2,reps:"10–15",note:"1 rett sett + 1 DC"},
    {id:"c3",ord:"C",name:"Skulderpress",type:"ss",sets:2,reps:"8–12"},
    {id:"c4",ord:"D",name:"Pec dec eller kabel flyes",type:"ss",sets:2,reps:"10–15",note:"21×12"},
    {id:"c5",ord:"E",name:"Incline press",type:"ss + DC",sets:2,reps:"8–12",note:"1 rett sett + 1 DC"},
    {id:"c6",ord:"F",name:"Lat pulldown",type:"ss",sets:2,reps:"8–12",note:"Lats"},
    {id:"c7",ord:"G",name:"Single arm lat row",type:"ss",sets:2,reps:"10–15",note:"Lats"},
    {id:"c8",ord:"H",name:"Semi wide cable row",type:"ss",sets:2,reps:"10–15",note:"Til Kelso shrugs · Traps + ryggstrekkere"},
  ]},
  limbsB:{name:"Limbs B",ex:[
    {id:"d0",ord:"ABS",name:"Planke",type:"ss",sets:2,reps:"60 sek",fields:["sek"],note:"Trekk inn magen ALT du kan. Mål: dypere inntrekk + kontroll, ikke lengre tid."},
    {id:"d1",ord:"A1",name:"Single arm preacher curl",type:"supersett",sets:3,reps:"10–15",note:"Supersett m/ A2"},
    {id:"d2",ord:"A2",name:"Maskin dips",type:"supersett",sets:3,reps:"10–15",note:"Supersett m/ A1"},
    {id:"d3",ord:"B",name:"Liggende ham curl",type:"ss",sets:2,reps:"10–15"},
    {id:"d4",ord:"C",name:"Leg extension",type:"ss",sets:2,reps:"10–15"},
    {id:"d5",ord:"D",name:"Beinpress",type:"ss",sets:1,reps:"10–15"},
    {id:"d6",ord:"E",name:"Sittende ham curl",type:"ss",sets:2,reps:"8–12"},
    {id:"d7",ord:"F",name:"Pendulum",type:"ss",sets:1,reps:"8–12"},
    {id:"d8",ord:"G",name:"Bulgarians",type:"ss",sets:1,reps:"12–20"},
    {id:"d9",ord:"H",name:"Calf raise",type:"ss",sets:2,reps:"10–15"},
  ]},
};
const ORDER = ["torsoA","limbsA","torsoB","limbsB"];

let sessions=[], current=null, draft=null, view="home";

const $=s=>document.querySelector(s);
const tCls=t=>t.includes("supersett")?"t-su":t.includes("DC")?"t-dc":"t-ss";
const today=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>{const x=new Date(d);return x.toLocaleDateString("no-NO",{day:"numeric",month:"short"})};

async function sget(k){try{const r=await window.storage.get(k);return r?JSON.parse(r.value):null}catch{return null}}
async function sset(k,v){try{await window.storage.set(k,JSON.stringify(v))}catch(e){console.error(e)}}

async function init(){
  sessions = await sget("bp-sessions") || [];
  render();
}

function lastSession(wk){
  return [...sessions].reverse().find(s=>s.wk===wk);
}

function render(){ view==="home"?renderHome():view==="workout"?renderWorkout():renderHistory(); }

function renderHome(){
  const split=["Torso","Limbs","Hvile","Torso","Hvile","Limbs","Hvile"];
  $("#app").innerHTML=`
  <h1>Treningsprogram</h1>
  <div class="sub">Alt ×2/uke · Intensitet 1–0 RIR · ${split.join(" · ")}</div>

  ${ORDER.map(wk=>{
    const p=PROGRAMS[wk], last=lastSession(wk);
    return `<div class="day" onclick="openWorkout('${wk}')">
      <div><b>${p.name}</b><br><small>${p.ex.length} øvelser${last?` · sist ${fmtDate(last.date)}`:" · ikke logget"}</small></div>
      <div style="color:var(--acc);font-size:22px">›</div></div>`;
  }).join("")}

  <div class="card">
    <div style="font-weight:600;margin-bottom:10px">I dag · ${fmtDate(today())}</div>
    <div class="chips" id="daily"></div>
  </div>

  <div class="row" style="gap:10px">
    <button class="btn ghost" onclick="showInfo()">Intensitetsteknikker</button>
    <button class="btn ghost" onclick="view='history';render()">Historikk</button>
  </div>`;
  renderDaily();
}

async function renderDaily(){
  const k="bp-daily-"+today();
  const st=await sget(k)||{};
  const items=[["steps","10k skritt"],["cardio","20 min sykkel 120–140"],["vacuum","Vacuum 6 hold"]];
  $("#daily").innerHTML=items.map(([id,l])=>
    `<div class="chip ${st[id]?"on":""}" onclick="toggleDaily('${id}')">${st[id]?"✓":"○"} ${l}</div>`).join("");
}
async function toggleDaily(id){
  const k="bp-daily-"+today();const st=await sget(k)||{};st[id]=!st[id];await sset(k,st);renderDaily();
}

async function openWorkout(wk){
  current=wk;
  const saved=await sget("bp-draft-"+wk);
  const p=PROGRAMS[wk], prev=lastSession(wk);
  draft={};
  p.ex.forEach(e=>{
    if(saved&&saved[e.id]) draft[e.id]=saved[e.id];
    else draft[e.id]=Array.from({length:e.sets},()=>({a:"",b:"",done:false}));
  });
  view="workout";render();window.scrollTo(0,0);
}

function renderWorkout(){
  const p=PROGRAMS[current], prev=lastSession(current);
  $("#app").innerHTML=`
  <button class="back" onclick="leaveWorkout()">‹ Tilbake</button>
  <h1>${p.name}</h1>
  <div class="sub">1–0 RIR · ${prev?`forrige økt ${fmtDate(prev.date)}`:"ingen tidligere logg"}</div>
  ${p.ex.map(e=>exCard(e,prev)).join("")}
  <div class="bar">
    <button class="btn ghost" onclick="leaveWorkout()">Avbryt</button>
    <button class="btn primary" onclick="saveSession()">Lagre økt ✓</button>
  </div>`;
  renderTimer();
}

function exCard(e,prev){
  const sets=draft[e.id];
  const pv=prev&&prev.data[e.id];
  const fields=e.fields||["kg","reps"];
  const allDone=sets.every(s=>s.done)&&sets.length>0;
  return `<div class="ex ${allDone?"done":""}" id="ex-${e.id}">
    <div class="exhead">
      <div class="ord">${e.ord}</div>
      <div style="flex:1">
        <div class="exname">${e.name}</div>
        <div class="meta">
          <span class="tag ${tCls(e.type)}">${e.type.toUpperCase()}</span>
          <span class="reps">${e.reps}</span>
        </div>
      </div>
    </div>
    ${e.note?`<div class="note">${e.note}</div>`:""}
    <div class="sets">
      ${sets.map((s,i)=>setRow(e,i,s,pv&&pv[i],fields)).join("")}
    </div>
    <button class="addset" onclick="addSet('${e.id}')">+ Sett</button>
  </div>`;
}

function setRow(e,i,s,pv,fields){
  const prevTxt = pv ? (fields.length===1?`${pv.a||"–"}`:`${pv.a||"–"}×${pv.b||"–"}`) : "–";
  const single=fields.length===1;
  return `<div class="set">
    <span class="snum">${i+1}</span>
    <span class="prev">${prevTxt}</span>
    <div class="fld">
      <input inputmode="decimal" value="${s.a}" placeholder="${pv?pv.a:""}"
        oninput="upd('${e.id}',${i},'a',this.value)"><span class="lab">${fields[0]}</span>
    </div>
    ${single?"":`<div class="fld">
      <input inputmode="numeric" value="${s.b}" placeholder="${pv?pv.b:""}"
        oninput="upd('${e.id}',${i},'b',this.value)"><span class="lab">${fields[1]}</span>
    </div>`}
    <div class="chk ${s.done?"on":""}" onclick="toggleDone('${e.id}',${i})">${s.done?"✓":""}</div>
  </div>`;
}

function upd(id,i,k,v){draft[id][i][k]=v;saveDraft();}
function toggleDone(id,i){
  draft[id][i].done=!draft[id][i].done;saveDraft();
  if(draft[id][i].done){startTimer(90);}
  const e=PROGRAMS[current].ex.find(x=>x.id===id);
  const prev=lastSession(current);
  $("#ex-"+id).outerHTML=exCard(e,prev);
}
function addSet(id){
  const last=draft[id][draft[id].length-1]||{a:"",b:"",done:false};
  draft[id].push({a:"",b:"",done:false});
  saveDraft();
  const e=PROGRAMS[current].ex.find(x=>x.id===id);
  $("#ex-"+id).outerHTML=exCard(e,lastSession(current));
}
async function saveDraft(){await sset("bp-draft-"+current,draft);}

async function saveSession(){
  const has=Object.values(draft).some(arr=>arr.some(s=>s.a||s.b));
  if(!has){toast("Ingenting logget");return;}
  sessions.push({wk:current,date:new Date().toISOString(),data:JSON.parse(JSON.stringify(draft))});
  await sset("bp-sessions",sessions);
  await window.storage.delete("bp-draft-"+current).catch(()=>{});
  toast("Økt lagret ✓");
  view="home";current=null;draft=null;render();
}
function leaveWorkout(){view="home";current=null;render();}

/* ---- history ---- */
function renderHistory(){
  const list=[...sessions].reverse();
  $("#app").innerHTML=`
  <button class="back" onclick="view='home';render()">‹ Tilbake</button>
  <h1>Historikk</h1>
  <div class="sub">${sessions.length} loggførte økter</div>
  ${list.length?list.map((s,idx)=>{
    const p=PROGRAMS[s.wk];
    return `<div class="card">
      <div class="row" style="justify-content:space-between">
        <b>${p.name}</b><span class="small">${new Date(s.date).toLocaleString("no-NO",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>
      </div>
      <div style="margin-top:8px">
        ${p.ex.map(e=>{
          const d=s.data[e.id];if(!d||!d.some(x=>x.a||x.b))return "";
          const f=e.fields||["kg","reps"];
          const sets=d.filter(x=>x.a||x.b).map(x=>f.length===1?`${x.a}`:`${x.a}×${x.b}`).join("  ");
          return `<div class="kvi"><span>${e.name}</span><b>${sets}</b></div>`;
        }).join("")}
      </div>
      <button class="addset" style="margin-top:10px;color:var(--acc);border-color:var(--line)" onclick="delSession(${sessions.length-1-idx})">Slett økt</button>
    </div>`;
  }).join(""):`<div class="card small">Ingen økter ennå.</div>`}`;
}
async function delSession(i){sessions.splice(i,1);await sset("bp-sessions",sessions);renderHistory();}

/* ---- info ---- */
function showInfo(){
  $("#sheet").innerHTML=`
  <h3>Intensitetsteknikker</h3>
  <div class="small">Baseline 1–0 RIR · siste 1–2 uker av mesosyklus RPE 9–10</div>
  <div class="it"><b>Rest-pause:</b> Ved failure — pust 10 ganger (20–30 sek), så til failure igjen med samme vekt.</div>
  <div class="it"><b>Cluster:</b> 3 mini-sett med kun 20 sek pause (f.eks. 15 → 9 → 6 reps).</div>
  <div class="it"><b>GIANT-sett:</b> Sett på 10–15 reps. Samme vekt, 30 sek pauser til totalt antall reps er nådd.</div>
  <div class="it"><b>DC (rest-pause ×3):</b> 1 aktivert sett kjørt som tre rest-pause-bolker til failure.</div>
  <div class="it"><b>Supersett:</b> A1 og A2 ryggrad mot ryggrad uten pause.</div>
  <div class="it" style="border-top:1px solid var(--line);padding-top:12px;margin-top:14px"><b>Progresjon:</b> Økning i reps/sett (logg), volum og intensitetsteknikker — reguleres ut fra check-in.</div>
  <button class="btn primary" style="text-align:center;margin-top:8px" onclick="closeModal()">Lukk</button>`;
  $("#modal").classList.add("on");
}
function closeModal(){$("#modal").classList.remove("on");}

/* ---- toast ---- */
let tt;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("on");clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("on"),1600);}

/* ---- rest timer ---- */
let timerSec=0,timerInt=null;
function renderTimer(){
  let el=$("#timer");
  if(!el){el=document.createElement("div");el.className="timer";el.id="timer";document.body.appendChild(el);}
  el.innerHTML=`<button onclick="addTime(-15)">−</button>
    <span class="t" id="ttxt">${fmtT(timerSec)}</span>
    <button onclick="addTime(15)">+</button>
    <button onclick="${timerInt?"stopTimer()":"startTimer(90)"}" style="width:44px">${timerInt?"■":"▶"}</button>`;
}
function fmtT(s){const m=Math.floor(s/60),x=s%60;return (m?m+":":"")+String(x).padStart(m?2:1,"0")+(m?"":"s");}
function startTimer(s){timerSec=s;clearInterval(timerInt);timerInt=setInterval(()=>{
  timerSec--;if($("#ttxt"))$("#ttxt").textContent=fmtT(timerSec);
  if(timerSec<=0){stopTimer();if(navigator.vibrate)navigator.vibrate([200,100,200]);toast("Pause ferdig");}
},1000);renderTimer();}
function stopTimer(){clearInterval(timerInt);timerInt=null;renderTimer();}
function addTime(d){timerSec=Math.max(0,timerSec+d);if($("#ttxt"))$("#ttxt").textContent=fmtT(timerSec);}

init();
</script>
